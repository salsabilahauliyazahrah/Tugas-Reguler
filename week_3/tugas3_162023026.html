<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Week 3</title>

    <script src="https://jscolor.com/release/2.4.5/jscolor.js"></script>

    <style>
        body {
            background: #3f6aa3;
            color: rgb(175, 11, 11);
            font-family: 'sans-serif';        
            padding: 20px;
        }

        .jscolor {
            width: 40px;
            height: 20px;
            border: 2px solid #ccc;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Preferensi Warna</h1>

    <div>
        <fieldset>
            <legend>Warna</legend>

            <p>
                1. Warna latarbelakang
                <input type="color" id="lb" value="#3f6aa3">
            </p>

            <p>
                2. Warna teks
                <input type="color" id="text" value="#ff0000">
            </p>            

        </fieldset>
        <button onclick="simpan()">Simpan</button>

        <script>
        function simpan() {
            const warnaLatar = document.getElementById("lb").value;
            const warnaTeks = document.getElementById("text").value;

            document.body.style.backgroundColor = warnaLatar;
            document.body.style.color = warnaTeks;
        }
        </script>        
    </div>
</body>
</html>
